<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #cceed6;
      --surface:     #bfe5c9;
      --card:        #9eb474;
      --border:      #8aa562;
      --gold:        #2a4930;
      --gold-light:  #3d6644;
      --gold-dim:    #4a7a52;
      --cream:       #2a4930;
      --text:        #2a4930;
      --muted:       #4a6b52;
      --hot:         #c0392b;
      --cold:        #2471a3;
      --radius:      16px;
      --modal-w:     460px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-weight: 400;
      overflow-x: hidden;
    }

    /* ─── Grain overlay ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
    }

    /* ─── Ambient blobs ─── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(120px);
      pointer-events: none; z-index: 0; opacity: 0.12;
    }
    .blob-1 { width: 500px; height: 500px; background: #4a7a52; top: -120px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #2a4930; bottom: -80px; left: -80px; }

    /* ─── Layout ─── */
    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Header ─── */
    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 38px; font-weight: 700; letter-spacing: 3px;
      background: linear-gradient(135deg, #2a4930 0%, #4a7a52 60%, #3d6644 100%);
     background-clip: text;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
    }
    .tagline { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    /* ─── Menu grid ─── */
    main { flex: 1; padding: 48px 32px; max-width: 900px; margin: 0 auto; width: 100%; }
    .section-label {
      font-size: 11px; color: var(--gold-dim); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 24px; text-align: center;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    /* ─── Menu Card ─── */
    .menu-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px 24px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      transition: border-color .25s, transform .2s, box-shadow .25s;
      position: relative; overflow: hidden;
      animation: fadeUp .5s ease both;
    }
    .menu-card:nth-child(1) { animation-delay: .05s }
    .menu-card:nth-child(2) { animation-delay: .1s }
    .menu-card:nth-child(3) { animation-delay: .15s }
    .menu-card:nth-child(4) { animation-delay: .2s }
    .menu-card:nth-child(5) { animation-delay: .25s }

    .menu-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, transparent 70%);
      opacity: 0; transition: opacity .3s;
    }
 .counter-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
}
    .counter-btn:hover { border-color: var(--gold); background: rgba(201,169,110,.1); }
    .counter-btn:active { transform: scale(.92); }
    .counter-val {
      min-width: 80px; text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 36px; color: var(--cream);
    }
    .counter-unit { font-size: 12px; color: var(--muted); margin-top: -4px; }

    .cta-btn {
      width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, #2a4930 0%, #3d6644 100%);
      color: #cceed6;
      font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: opacity .2s, transform .15s;
    }
    .cta-btn:hover   { opacity: .9; transform: translateY(-1px); }
    .cta-btn:active  { transform: scale(.98); }

    /* ─── Result Panel ─── */
    .result-panel { display: none; }
    .result-panel.show { display: block; animation: fadeUp .4s ease both; }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--gold); text-align: center; margin-bottom: 20px;
    }
    .ingredients { display: flex; flex-direction: column; gap: 10px; }
    .ing-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
    }
    .ing-label { font-size: 14px; color: var(--muted); }
    .ing-val   { font-size: 16px; font-weight: 700; color: var(--cream); }
    .ing-val span { font-size: 11px; color: var(--muted); font-weight: 400; margin-right: 2px; }

    /* ─── Closing Quote ─── */
    .closing-quote {
      margin-top: 28px; padding: 18px 20px;
      border-top: 1px solid var(--border);
      font-size: 13px; line-height: 1.8; color: var(--muted);
      text-align: center; font-style: italic;
      opacity: 0;
      animation: none;
    }
    .closing-quote.reveal {
      animation: fadeIn 1.4s ease 0.6s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Footer ─── */
    footer {
      padding: 20px; text-align: center;
      font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border);
      letter-spacing: 1px;
    }
.card-icon { font-size: 36px; line-height: 1; }

.card-icon img {
  width: 80px;
  height: 80px;
  object-fit: contain;
}
    @media (max-width: 600px) {
      header { padding: 36px 20px 24px; }
      main   { padding: 32px 16px; }
      .brand { font-size: 28px; }
      .modal { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">
  <!-- Header -->
  <header>
    <div class="brand">Coffee Code</div>
    <div class="tagline">حاسبة الوصفات الاحترافية</div>
  </header>

  <!-- Menu -->
  <main>
    <p class="section-label">اختر مشروبك</p>
    <div class="menu-grid" id="menuGrid"></div>
  </main>

  <footer>Coffee Code — صُنع بعناية واهتمام</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>

   
    <div class="modal-header">
      <div class="modal-icon" id="mIcon"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-desc"  id="mDesc"></div>
    </div>
    <div class="divider"></div>

  
    <div id="configArea"></div>

    <button class="cta-btn" id="ctaBtn" onclick="getRecipe()">✦ احصل على الوصفة</button>
    <div class="divider" id="resultDivider" style="display:none"></div>

    <div class="result-panel" id="resultPanel">
      <div class="result-title">🧾 المقادير</div>
      <div class="ingredients" id="ingredientsOut"></div>
      <div class="closing-quote" id="closingQuote">
        "وصفة متوازنة صُنعت لتروق لك.. مزيجك المثالي جاهز الآن، استمتع بمشروبك وبوقتك."
      </div>
    </div>
  </div>
</div>

<script>
const MENU = [
  {
    id: 'brew_day',
    name: 'قهوة اليوم',
    sub: 'Filter Coffee',
    icon: 'images/coffee.jpg',
    type: 'drip',
    ratioHot: 16,   // 1g coffee : 16ml water
    ratioCold: 12,  // total brew ratio for cold (split 60/40)
    minGrams: 10, maxGrams: 150, defaultGrams: 18,
  },
  {
    id: 'v60',
    name: 'V60',
    sub: 'V60',
    icon: 'images/V60.jpg',
    type: 'drip',
    ratioHot: 15,
    ratioCold: 12,
    minGrams: 12, maxGrams: 150, defaultGrams: 20,
  },
  {
    id: 'spanish',
    name: 'سبانيش لاتيه',
    sub: 'Spanish Latte',
    icon: 'images/Spanich.jpg',
    type: 'milk',
    sizes: {
      S: { shots: 1, milk: 130, sweetened_milk: 30 },
      M: { shots: 2, milk: 180, sweetened_milk: 40 },
      L: { shots: 2, milk: 240, sweetened_milk: 50 },
    },
  },
  {
    id: 'ice_latte',
    name: 'آيس لاتيه',
    sub: 'Iced Latte',
    icon: 'images/icecoffee.jpg',
    type: 'milk',
    forceTemp: 'cold',
    sizes: {
      S: { shots: 1, milk: 130, ice: 80 },
      M: { shots: 2, milk: 170, ice: 100 },
      L: { shots: 2, milk: 220, ice: 130 },
    },
  },
  {
    id: 'matcha',
    name: 'ماتشا',
    sub: 'Matcha Latte',
    icon: 'images/Matcha.jpg',
    type: 'matcha',
    sizes: {
      S: { matcha_g: 3, milk: 150, syrup: 10 },
      M: { matcha_g: 4, milk: 200, syrup: 15 },
      L: { matcha_g: 5, milk: 260, syrup: 20 },
    },
  },
];

let currentDrink = null;
let selectedTemp = 'hot';
let selectedSize = 'M';
let grams = 18;


function renderMenu() {
  const grid = document.getElementById('menuGrid');
  MENU.forEach(d => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.innerHTML = `
    <dive class="card-icon">
  <img src="${d.icon}" alt="${d.name}">
</div>
 <div class="card-name">${d.name}</div>
      <div class="card-sub">${d.sub}</div>
    `;
    card.onclick = () => openModal(d.id);
    grid.appendChild(card);
  });
}

function openModal(id) {
  currentDrink = MENU.find(d => d.id === id);
  if (!currentDrink) return;

  selectedTemp = currentDrink.forceTemp || 'hot';
  selectedSize = 'M';
  grams = currentDrink.defaultGrams || 18;
  hideResult();

  document.getElementById('mIcon').innerHTML = currentDrink.icon;
  document.getElementById('mTitle').textContent = currentDrink.name;
  document.getElementById('mDesc').textContent  = currentDrink.sub;

  buildConfig();

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function buildConfig() {
  const area = document.getElementById('configArea');
  area.innerHTML = '';
  const d = currentDrink;

  if (!d.forceTemp) {
    area.innerHTML += `
      <div class="toggle-label">درجة الحرارة</div>
      <div class="temp-toggle">
        <button class="temp-btn ${selectedTemp==='hot'?'active-hot':''}" onclick="setTemp('hot')">☀️ حار</button>
        <button class="temp-btn ${selectedTemp==='cold'?'active-cold':''}" onclick="setTemp('cold')">❄️ بارد</button>
      </div>
    `;
  }
  if (d.
  type === 'drip') {
    area.innerHTML += `
      <div class="toggle-label">جرامات القهوة</div>
      <div class="counter-wrap">
        <button class="counter-btn" onclick="changeGrams(-1)">−</button>
        <div style="text-align:center">
          <div class="counter-val" id="gramDisplay">${grams}</div>
          <div class="counter-unit">غرام</div>
        </div>
        <button class="counter-btn" onclick="changeGrams(1)">+</button>
      </div>
    `;
  } else {
    const sizes = d.sizes;
    const volMap = { S: '240ml', M: '330ml', L: '450ml' };
    area.innerHTML += `
      <div class="toggle-label">حجم الكوب</div>
      <div class="size-row">
        ${Object.keys(sizes).map(sz => `
          <button class="size-btn ${sz===selectedSize?'active':''}" onclick="setSize('${sz}')">
            <span class="sz-letter">${sz}</span>
            <span class="sz-ml">${volMap[sz]}</span>
          </button>
        `).join('')}
      </div>
    `;
  }
}

function setTemp(t) {
  selectedTemp = t;
  buildConfig();
  hideResult();
}

function setSize(s) {
  selectedSize = s;
  buildConfig();
  hideResult();
}

function changeGrams(delta) {
  const d = currentDrink;
  grams = Math.min(d.maxGrams, Math.max(d.minGrams, grams + delta));
  const el = document.getElementById('gramDisplay');
  if (el) el.textContent = grams;
  hideResult();
}

function getRecipe() {
  const d = currentDrink;
  let items = [];

  if (d.type === 'drip') {
    const totalWater = grams * (selectedTemp === 'hot' ? d.ratioHot : d.ratioCold);
    if (selectedTemp === 'hot') {
      items = [
        { label: 'القهوة المطحونة',  val: grams,       unit: 'غرام' },
        { label: 'الماء الساخن',     val: totalWater,  unit: 'مل' },
      ];
    } else {
      const hotWater = Math.round(totalWater * 0.6);
      const iceWater = Math.round(totalWater * 0.4);
      items = [
        { label: 'القهوة المطحونة', val: grams,     unit: 'غرام' },
        { label: 'الماء الساخن',    val: hotWater,  unit: 'مل' },
        { label: 'الثلج',           val: iceWater,  unit: 'غرام' },
      ];
    }
  } else if (d.type === 'milk') {
    const s = d.sizes[selectedSize];
    const isCold = selectedTemp === 'cold' || d.forceTemp === 'cold';
    if (d.id === 'ice_latte') {
      items = [
        { label: 'شوتات الإسبريسو', val: s.shots,   unit: 'شوت' },
        { label: 'الحليب',          val: s.milk,    unit: 'مل' },
        { label: 'الثلج',           val: s.ice,     unit: 'غرام' },
      ];
    } else {
      // spanish latte
      items = [
        { label: 'شوتات الإسبريسو',  val: s.shots,           unit: 'شوت' },
        { label: 'الحليب',           val: isCold ? s.milk : Math.round(s.milk * 0.9), unit: 'مل' },
        { label: 'الحليب المكثف',    val: s.sweetened_milk,  unit: 'مل' },
      ];
      if (isCold) items.push({ label: 'الثلج', val: Math.round(s.milk * 0.6), unit: 'غرام' });
    }
  } else if (d.type === 'matcha') {
    const s = d.sizes[selectedSize];
    const isCold = selectedTemp === 'cold';
    items = [
      { label: 'بودرة الماتشا',   val: s.matcha_g, unit: 'غرام' },
      { label: 'الماء الساخن',    val: 60,         unit: 'مل' },
      { label: 'الحليب',         val: s.milk,     unit: 'مل' },
      { label: 'السيروب',     val: s.syrup,    unit: 'مل' },
    ];
    if (isCold) items.push({ label: 'الثلج', val: Math.round(s.milk * 0.5), unit: 'غرام' });
  }

  showResult(items);
}

function showResult(items) {
  const out = document.getElementById('ingredientsOut');
  out.innerHTML = items.map(i => `
    <div class="ing-row">
      <span class="ing-label">${i.label}</span>
      <span class="ing-val">${i.val}<span> ${i.unit}</span></span>
    </div>
  `).join('');

  const panel = document.getElementById('resultPanel');
  const divider = document.
  getElementById('resultDivider');
  divider.style.display = 'block';
  panel.classList.add('show');
  
  const q = document.getElementById('closingQuote');
  q.classList.remove('reveal');
  void q.offsetWidth; // reflow
  q.classList.add('reveal');

  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function hideResult() {
  const panel = document.getElementById('resultPanel');
  const divider = document.getElementById('resultDivider');
  panel.classList.remove('show');
  divider.style.display = 'none';
  const q = document.getElementById('closingQuote');
  q.classList.remove('reveal');
}

renderMenu();
</script>
</body>
</html>
